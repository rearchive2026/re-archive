# Site settings
title: "탑마을 경남·벽산 재건축 추진위원회"
title_separator: "—"
subtitle: "공식 사이트"
name: "탑마을 경남·벽산 재건축 추진위원회"
description: "압도적 동의로 만드는 분당의 랜드마크, 탑마을 경남·벽산 재건축 추진위원회 공식 사이트입니다."
url: "https://rearchive2026.github.io"
baseurl: "/re-archive"
repository:
locale: "ko-KR"
date_format: "%Y.%m.%d"
words_per_minute: 200

# Theme
theme: minimal-mistakes-jekyll
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "default"

# Site Author
author:
  name: "탑마을 경남·벽산 재건축 추진위원회"
  bio: "공식 사이트"
  location: "성남시 분당구"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

include:
  - .htaccess
  - _pages
exclude:
  - vendor
  - .bundle
  - .sass-cache
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:year/:month/:day/:title:output_ext
paginate: 5
paginate_path: /page:num/
timezone: Asia/Seoul

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: false
      comments: false
      share: true
      related: true
      show_date: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false
